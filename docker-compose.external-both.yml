# Progento – Ollama and embedding on host (e.g. both on GPU machine). Use: ./start-external-both.sh
# Set OLLAMA_URL and EMBEDDING_SERVICE_URL in .env
name: progento

services:
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: progento-weaviate
    ports:
      - "8080:8080"
    volumes:
      - ${PROGENTO_DATA_ROOT:-.}/volumes/weaviate_data:/var/lib/weaviate
    environment:
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_ENABLED=true
      - CLUSTER_HOSTNAME=progento-weaviate
      - CLUSTER_GOSSIP_BIND_PORT=7100
      - CLUSTER_DATA_BIND_PORT=7101
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - progento-network

  postgres:
    image: postgres:15
    container_name: progento-postgres
    entrypoint: ["/usr/local/bin/postgres-entrypoint-wrapper.sh"]
    command: ["postgres"]
    volumes:
      - ${PROGENTO_DATA_ROOT:-.}/volumes/postgres_data:/var/lib/postgresql/data
      - ./scripts/db/postgres-entrypoint-wrapper.sh:/usr/local/bin/postgres-entrypoint-wrapper.sh:ro
    environment:
      - POSTGRES_DB=progento
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - progento-network

  api:
    image: ghcr.io/${GHCR_OWNER:-stefano-edgible}/progento-api:${PROGENTO_IMAGE_TAG:-latest}
    container_name: progento-api
    ports:
      - "8001:8000"
    volumes:
      - ${PROGENTO_DATA_ROOT:-.}/volumes/code_repos:/app/code_repos
      - ${PROGENTO_DATA_ROOT:-.}/volumes/knowledge_base:/app/knowledge_base
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - WEAVIATE_URL=http://weaviate:8080
      - POSTGRES_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/progento
      - EMBEDDING_SERVICE_URL=${EMBEDDING_SERVICE_URL:-http://host.docker.internal:8002}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi}
      - REPOS_BASE_PATH=/app/code_repos
      - PROGENTO_MAX_CHUNK_SIZE=${PROGENTO_MAX_CHUNK_SIZE:-1500}
      - PROGENTO_MARKDOWN_CHUNK_SIZE=${PROGENTO_MARKDOWN_CHUNK_SIZE:-2000}
      - PROGENTO_EMBEDDING_BATCH_SIZE=${PROGENTO_EMBEDDING_BATCH_SIZE:-4}
      - PROGENTO_TOP_K_RESULTS=${PROGENTO_TOP_K_RESULTS:-5}
      - LOG_LEVEL=INFO
      - API_PORT=8000
      - PROGENTO_URL_PREFIX=${PROGENTO_URL_PREFIX:-}
      - PROGENTO_EMBEDDING_MODEL=${PROGENTO_EMBEDDING_MODEL:-all-mpnet-base-v2}
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    depends_on:
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - progento-network

  ui:
    image: ghcr.io/${GHCR_OWNER:-stefano-edgible}/progento-ui:${PROGENTO_IMAGE_TAG:-latest}
    container_name: progento-ui
    ports:
      - "3001:80"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - progento-network

networks:
  progento-network:
    name: progento-network
    driver: bridge
